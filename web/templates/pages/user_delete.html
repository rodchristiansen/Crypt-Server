{{define "title"}}Delete User{{end}}

{{define "content"}}
<div class="row">
  <div class="col-md-6">
    <h2>Delete User</h2>
    {{if .ErrorMessage}}
      <div class="alert alert-danger">{{.ErrorMessage}}</div>
    {{end}}
    <p>Are you sure you want to delete <strong>{{.AdminUser.Username}}</strong>?</p>
    <form method="post" action="/admin/users/{{.AdminUser.ID}}/delete/">
      <button class="btn btn-danger" type="submit">Delete User</button>
      <a class="btn btn-outline-secondary" href="/admin/users/">Cancel</a>
    </form>
  </div>
</div>
{{end}}
