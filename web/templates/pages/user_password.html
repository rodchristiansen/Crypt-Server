{{define "title"}}Reset Password{{end}}

{{define "content"}}
<div class="row">
  <div class="col-md-6">
    <h2>Reset Password</h2>
    <p>User: <strong>{{.AdminUser.Username}}</strong></p>
    {{if .ErrorMessage}}
      <div class="alert alert-danger">{{.ErrorMessage}}</div>
    {{end}}
    <form method="post" action="/admin/users/{{.AdminUser.ID}}/password/">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}" />
      <div class="form-group">
        <label for="password">New password</label>
        <input id="password" name="password" type="password" class="form-control" />
      </div>
      <button class="btn btn-primary mt-3" type="submit">Reset Password</button>
      <a class="btn btn-outline-secondary mt-3" href="/admin/users/{{.AdminUser.ID}}/edit/">Back</a>
    </form>
  </div>
</div>
{{end}}
